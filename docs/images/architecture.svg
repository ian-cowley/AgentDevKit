<svg width="600" height="280" viewBox="0 0 600 280" xmlns="http://www.w3.org/2000/svg">
    <!-- Central Agent -->
    <rect x="220" y="100" width="160" height="80" rx="12" fill="rgba(74, 144, 226, 0.15)" stroke="#4a90e2" stroke-width="2" />
    <text x="300" y="145" text-anchor="middle" fill="#fff" font-weight="700" font-size="16">LlmAgent</text>
    
    <!-- Top: Logic Source -->
    <path d="M300 100 V 50" stroke="#94a3b8" stroke-dasharray="8 4" marker-end="url(#arrow)" />
    <circle cx="300" cy="35" r="25" fill="rgba(108, 92, 231, 0.15)" stroke="#6c5ce7" stroke-width="2" />
    <text x="300" y="40" text-anchor="middle" fill="#6c5ce7" font-weight="700" font-size="10">LLM</text>

    <!-- Down: Output -->
    <path d="M300 180 V 230" stroke="#94a3b8" marker-end="url(#arrow)" />
    <text x="310" y="215" fill="#94a3b8" font-size="12">Final Output</text>

    <!-- Left: Input -->
    <path d="M100 140 H 220" stroke="#94a3b8" marker-end="url(#arrow)" />
    <text x="110" y="130" fill="#94a3b8" font-size="12">User Prompt</text>

    <!-- Defs for arrow -->
    <defs>
        <marker id="arrow" markerWidth="10" height="10" refX="9" refY="3" orient="auto">
            <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8" />
        </marker>
    </defs>
</svg>
